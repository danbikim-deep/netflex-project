<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 스트리밍 서비스</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 헤더 영역 -->
    <header class="header">
        <div class="header-container">
            <h1 class="logo">NETFLEX</h1>
            <nav class="navigation">
                <ul class="menu-list">
                    <li class="menu-item"><a href="#" class="menu-link">홈</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">영화</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">시리즈</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">내가 찜한 콘텐츠</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-content">
        <!-- 대표 배너 섹션 -->
        <section class="hero-banner">
            <div class="banner-content">
                <h2 class="banner-title">사냥개들2</h2>
                <p class="banner-description">
                    복수를 위해 뭉친 세 남자의 치열한 추격전이 시작된다.
                    거대한 악에 맞서는 그들의 뜨거운 이야기.
                </p>
                <div class="banner-buttons">
                    <button class="button button-primary">▶ 재생</button>
                    <button class="button button-secondary">ⓘ 상세 정보</button>
                </div>
            </div>
        </section>

        <!-- 콘텐츠 카드 섹션 -->
        <section class="content-section">
            <p class="section-label">ORIGINAL</p>
            <h2 class="section-title">인기 콘텐츠</h2>
            <div class="card-container">
                <article class="content-card">
                    <div class="card-image card-image-1"></div>
                    <div class="card-info">
                        <h3 class="card-title">기리고</h3>
                        <p class="card-description">소원이 이루어진다면</p>
                    </div>
                </article>

                <article class="content-card">
                    <div class="card-image card-image-2"></div>
                    <div class="card-info">
                        <h3 class="card-title">은중과 상연</h3>
                        <p class="card-description">두 여자의 특별한 우정 이야기</p>
                    </div>
                </article>

                <article class="content-card">
                    <div class="card-image card-image-3"></div>
                    <div class="card-info">
                        <h3 class="card-title">오징어 게임</h3>
                        <p class="card-description">456억의 상금을 위한 생존 게임</p>
                    </div>
                </article>

                <article class="content-card">
                    <div class="card-image card-image-4"></div>
                    <div class="card-info">
                        <h3 class="card-title">기생수 더 그레이</h3>
                        <p class="card-description">인간과 기생생물의 공존</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <!-- 푸터 영역 -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#" class="footer-link">자주 묻는 질문</a>
                <a href="#" class="footer-link">고객 센터</a>
                <a href="#" class="footer-link">계정</a>
                <a href="#" class="footer-link">미디어 센터</a>
            </div>
            <p class="footer-copyright">&copy; 2026 NETFLEX. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
